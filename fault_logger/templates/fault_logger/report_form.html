<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report a Fault</title>
    <style>
        :root {
            --bg: #f5f7fb;
            --card: #ffffff;
            --text: #1f2937;
            --muted: #64748b;
            --accent-red: #dc2626;
            --button: #0b5ed7;
            --button-hover: #0a53be;
        }

        * {
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: var(--bg);
            color: var(--text);
            padding: 1rem;
        }

        .form-card {
            position: relative;
            width: min(620px, 100%);
            background: var(--card);
            border-radius: 14px;
            padding: 1.4rem;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
        }

        .close-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1px solid #d1d5db;
            color: #475569;
            background: #f8fafc;
            display: grid;
            place-items: center;
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: 700;
            line-height: 1;
        }

        .close-btn:hover {
            color: #0f172a;
            background: #e2e8f0;
        }

        h1 {
            margin-top: 0;
            margin-bottom: 1rem;
            font-size: 1.4rem;
        }

        .field {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            margin-bottom: 0.45rem;
            font-weight: 600;
        }

        select,
        textarea {
            width: 100%;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            padding: 0.7rem;
            font-size: 1rem;
            background: #fff;
        }

        .description-wrap {
            position: relative;
        }

        textarea {
            min-height: 160px;
            resize: vertical;
            padding-right: 2.8rem;
        }

        .mic {
            position: absolute;
            right: 10px;
            bottom: 10px;
            width: 34px;
            height: 34px;
            border: 1px solid #d1d5db;
            border-radius: 999px;
            display: grid;
            place-items: center;
            color: var(--muted);
            font-size: 1.15rem;
            background: #f8fafc;
            pointer-events: none;
        }

        .upload-note {
            margin-top: 0.35rem;
            color: #64748b;
            font-size: 0.82rem;
        }

        .toggle-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #fee2e2;
            border: 1px solid #fecaca;
            border-radius: 10px;
            padding: 0.75rem;
            margin-bottom: 0.45rem;
        }

        .toggle-row span {
            color: #991b1b;
            font-weight: 700;
        }

        .switch {
            position: relative;
            width: 52px;
            height: 30px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            inset: 0;
            cursor: pointer;
            background: #cbd5e1;
            border-radius: 999px;
            transition: background 0.2s ease;
        }

        .slider::before {
            content: "";
            position: absolute;
            width: 22px;
            height: 22px;
            left: 4px;
            top: 4px;
            border-radius: 50%;
            background: #fff;
            transition: transform 0.2s ease;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.25);
        }

        .switch input:checked + .slider {
            background: var(--accent-red);
        }

        .switch input:checked + .slider::before {
            transform: translateX(22px);
        }

        .location-note {
            margin: 0 0 1rem;
            color: #334155;
            font-size: 0.9rem;
        }

        .actions {
            display: block;
        }

        .submit-btn {
            width: 100%;
            border: none;
            border-radius: 10px;
            padding: 0.9rem;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            color: white;
            background: var(--button);
        }

        .submit-btn:hover {
            background: var(--button-hover);
        }

    </style>
</head>
<body>
    <section class="form-card">
        <a class="close-btn" href="{% url 'map_landing' %}" aria-label="Close and go back">x</a>
        <h1>Report New Fault</h1>
        <form>
            <div class="field">
                <label for="issue_type">Issue Type</label>
                <select id="issue_type" name="issue_type">
                    <option>Pothole</option>
                    <option>Water Leak</option>
                    <option>Streetlight</option>
                </select>
            </div>

            <div class="field">
                <label for="description">Description</label>
                <div class="description-wrap">
                    <textarea id="description" name="description" placeholder="Describe the problem here..."></textarea>
                    <div class="mic" title="Voice-to-text placeholder" aria-hidden="true">🎤</div>
                </div>
            </div>

            <div class="field">
                <label for="fault_image">Upload Image (Optional)</label>
                <input id="fault_image" name="fault_image" type="file" accept="image/*">
                <div class="upload-note">Attach a photo if available.</div>
            </div>

            <div class="toggle-row">
                <span>Safety Hazard Fast-Track</span>
                <label class="switch" for="is_hazard">
                    <input id="is_hazard" type="checkbox" name="is_hazard">
                    <span class="slider"></span>
                </label>
            </div>

            <p class="location-note">Location automatically detected.</p>

            <div class="actions">
                <button class="submit-btn" type="button">Submit</button>
            </div>
        </form>
    </section>
</body>
</html>
